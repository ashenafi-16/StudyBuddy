apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy
    app.kubernetes.io/component: celery
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: celery
  template:
    metadata:
      labels:
        app.kubernetes.io/name: studybuddy
        app.kubernetes.io/component: celery
    spec:
      containers:
        - name: celery
          image: studybuddy-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "studybuddy", "worker", "-l", "info"]
          envFrom:
            - configMapRef:
                name: studybuddy-config
            - secretRef:
                name: studybuddy-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
