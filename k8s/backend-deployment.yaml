apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: studybuddy
        app.kubernetes.io/component: backend
    spec:
      initContainers:
        - name: migrate
          image: studybuddy-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef:
                name: studybuddy-config
            - secretRef:
                name: studybuddy-secrets
      containers:
        - name: backend
          image: studybuddy-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "studybuddy.asgi:application"]
          envFrom:
            - configMapRef:
                name: studybuddy-config
            - secretRef:
                name: studybuddy-secrets
          readinessProbe:
            httpGet:
              path: /api/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/component: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
