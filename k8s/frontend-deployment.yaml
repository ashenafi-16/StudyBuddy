apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: studybuddy
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: studybuddy-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/component: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
