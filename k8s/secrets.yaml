apiVersion: v1
kind: Secret
metadata:
  name: studybuddy-secrets
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy
type: Opaque
stringData:
  # ──────────────────────────────────────────
  # REPLACE these placeholder values with real
  # secrets before deploying to a real cluster
  # ──────────────────────────────────────────
  DJANGO_SECRET_KEY: "change-me-to-a-real-secret-key"
  DB_PASSWORD: "studybuddy_secret"
  POSTGRES_PASSWORD: "studybuddy_secret"

  # Email
  EMAIL_HOST_USER: "your-email@gmail.com"
  EMAIL_FROM: "your-email@gmail.com"
  EMAIL_HOST_PASSWORD: "your-app-password"
  DEFAULT_FROM_EMAIL: "StudyBuddy <your-email@gmail.com>"

  # Cloudinary
  CLOUDINARY_CLOUD_NAME: "your-cloud-name"
  CLOUDINARY_API_KEY: "your-api-key"
  CLOUDINARY_API_SECRET: "your-api-secret"

  # Chapa
  CHAPA_SECRET_KEY: "your-chapa-secret"
  CHAPA_PUBLIC_KEY: "your-chapa-public"

  # Google OAuth
  GOOGLE_CLIENT_ID: "your-google-client-id"
  GOOGLE_SECRET: "your-google-secret"

  # Resend
  RESEND_API_KEY: "your-resend-api-key"
