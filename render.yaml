services:
  # 1. Django Backend (Web Service)
  - type: web
    name: studybuddy-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile.backend
    plan: free
    healthCheckPath: /api/health/

    envVars:
      - key: DATABASE_URL
        value: your-render-postgres-url

      - key: REDIS_URL
        value: your-upstash-redis-url

      - key: CELERY_BROKER_URL
        value: your-upstash-redis-url

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: studybuddy-backend.onrender.com,localhost

      - key: DJANGO_SECRET_KEY
        generateValue: true

  # 2. Celery Worker (Background Tasks)
  - type: worker
    name: studybuddy-celery
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile.backend
    plan: free

    startCommand: celery -A studybuddy worker -l info

    envVars:
      - key: DATABASE_URL
        value: your-render-postgres-url

      - key: REDIS_URL
        value: your-upstash-redis-url

      - key: CELERY_BROKER_URL
        value: your-upstash-redis-url
