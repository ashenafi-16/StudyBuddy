services:
  - type: web
    name: studybuddy-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile.backend
    plan: free
    healthCheckPath: /api/health/

    envVars:
      - key: DATABASE_URL
        sync: false

      - key: REDIS_URL
        sync: false

      - key: CELERY_BROKER_URL
        sync: false

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: studybuddy-backend.onrender.com,localhost,127.0.0.1

      - key: DJANGO_SECRET_KEY
        generateValue: true
