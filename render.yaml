services:
  # 1. PostgreSQL Database
  - type: database
    name: studybuddy-db
    databaseName: studybuddy
    user: ashenafi
    plan: free # Change to a paid plan for production

  # 2. Redis
  - type: redis
    name: studybuddy-redis
    plan: free # Change to a paid plan for production
    ipAllowList: [] # Only allow internal traffic

  # 3. Django Backend (Web Service)
  - type: web
    name: studybuddy-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile.backend
    plan: free
    healthCheckPath: /api/health/ # Ensure you have a health check endpoint
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: studybuddy-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: studybuddy-redis
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*" # Adjust this to your specific domain later
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: CELERY_BROKER_URL
        fromRedis:
          name: studybuddy-redis
          property: connectionString

  # 4. Celery Worker (Background Worker)
  - type: worker
    name: studybuddy-celery
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile.backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: studybuddy-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: studybuddy-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromRedis:
          name: studybuddy-redis
          property: connectionString
    buildCommand: "" # Not needed for worker in docker env
    startCommand: celery -A studybuddy worker -l info

  # 5. React Frontend (Web Service)
  - type: web
    name: studybuddy-frontend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile.frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: studybuddy-backend
          property: host
